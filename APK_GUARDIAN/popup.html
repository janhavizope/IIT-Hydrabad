<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APK Guardian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1e; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; width: 320px; min-height: 400px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo { width: 34px; height: 34px; background: linear-gradient(135deg, #0ea5e9, #06b6d4); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; color: #fff; }
    .brand-name { font-size: 14px; font-weight: 700; }
    .brand-sub { font-size: 9px; color: #64748b; letter-spacing: 1.5px; text-transform: uppercase; }
    .status-pill { display: flex; align-items: center; gap: 5px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); border-radius: 999px; padding: 3px 10px; font-size: 10px; font-weight: 700; color: #4ade80; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .stats-bar { display: flex; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .stat-item { flex: 1; padding: 12px 0 10px; text-align: center; }
    .stat-item:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.06); }
    .stat-num { font-size: 22px; font-weight: 800; }
    .stat-num.safe { color: #22c55e; }
    .stat-num.suspicious { color: #f59e0b; }
    .stat-num.malware { color: #ef4444; }
    .stat-label { font-size: 10px; color: #475569; margin-top: 1px; }
    .section-header { padding: 12px 16px 8px; font-size: 10px; font-weight: 700; color: #475569; letter-spacing: 1.5px; text-transform: uppercase; }
    .scan-list { padding: 0 12px 12px; }
    .scan-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 9px; margin-bottom: 3px; }
    .scan-item:hover { background: rgba(255,255,255,0.04); }
    .verdict-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .verdict-dot.SAFE { background: #22c55e; }
    .verdict-dot.SUSPICIOUS { background: #f59e0b; }
    .verdict-dot.MALICIOUS { background: #ef4444; }
    .scan-name { flex: 1; font-size: 12px; font-weight: 500; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scan-score { font-size: 11px; font-weight: 700; }
    .scan-score.high { color: #ef4444; }
    .scan-score.med { color: #f59e0b; }
    .scan-score.low { color: #22c55e; }
    .empty-state { text-align: center; padding: 30px 20px; color: #475569; font-size: 12px; }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }
    .footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
    .footer-note { font-size: 10px; color: #334155; }
    .refresh-btn { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); border-radius: 7px; color: #00d4ff; font-size: 11px; font-weight: 600; padding: 5px 12px; cursor: pointer; }
    .refresh-btn:hover { background: rgba(0,212,255,0.18); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <div class="logo">AG</div>
      <div>
        <div class="brand-name">APK <span style="color:#00d4ff">Guardian</span></div>
        <div class="brand-sub">Security Scanner</div>
      </div>
    </div>
    <div class="status-pill"><div class="status-dot"></div>ACTIVE</div>
  </div>
  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num safe" id="stat-safe">0</div><div class="stat-label">Safe</div></div>
    <div class="stat-item"><div class="stat-num suspicious" id="stat-suspicious">0</div><div class="stat-label">Suspicious</div></div>
    <div class="stat-item"><div class="stat-num malware" id="stat-malware">0</div><div class="stat-label">Malware</div></div>
  </div>
  <div class="section-header">Recent Scans</div>
  <div class="scan-list" id="scanList">
    <div class="empty-state">
      <div class="empty-icon">🛡️</div>
      <div>No scans yet</div>
      <div style="color:#334155; margin-top:4px">Guardian is watching your downloads</div>
    </div>
  </div>
  <div class="footer">
    <span class="footer-note">All downloads monitored</span>
    <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
